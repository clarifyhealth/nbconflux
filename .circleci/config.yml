version: 2.1

orbs:
  python: circleci/python@2.1.1
  jq: circleci/jq@2.2
  aws-cli: circleci/aws-cli@2.0.0

repo_cache_key: &repo_cache_key
                  v2-{{ .Branch }}-dependencies-{{ checksum "requirements.txt" }}-{{ checksum "requirements-test.txt" }}

restore_repo: &restore_repo
  restore_cache:
    key: *repo_cache_key

save_repo: &save_repo
  save_cache:
    key: *repo_cache_key
    paths:
      - ./venv

jobs:
  check-for-sensitive-information:
    docker:
      - image: cimg/python:3.11.11
    steps:
      - checkout
      - run:
          name: check_for_sensitive_information
          command: |
            make install-git-secrets-circleci
            ./git-secrets-runner.sh

  build-and-test:
    executor:
      name: python/default
      tag: '3.11'
    steps:
      - checkout
      - jq/install
      - aws-cli/setup:
          profile-name: default
      - run:
          name: Install Repo
          command: |
            python3 -m venv venv
            . venv/bin/activate
            aws codeartifact login --tool pip --repository clarifypypi --domain clarifyhealth --domain-owner 947634201780
            pip install "pip==23.0.1" --extra-index-url https://pypi.org/simple
            pip install -r requirements.txt --extra-index-url https://pypi.org/simple
            pip install -r requirements-test.txt --extra-index-url https://pypi.org/simple
            pip install -e "." --extra-index-url https://pypi.org/simple
      - run:
          name: Style Compliance
          command: |
            . venv/bin/activate
            flake8 nbconflux/
      - run:
          name: Cyclomatic Complexity Check
          command: |
            . venv/bin/activate
            radon cc -n C nbconflux/
      - run:
          name: Maintainability Index Check
          command: |
            . venv/bin/activate
            radon mi -nc nbconflux/
      - run:
          name: Tests
          command: |
            . venv/bin/activate
            pytest
      - run:
          name: Confirm build can install
          command: |
            . venv/bin/activate
            python3 setup.py sdist
            pip install ./dist/nbconflux* --extra-index-url https://pypi.org/simple
      - *save_repo

  artifact:
    executor:
      name: python/default
      tag: '3.11'
    steps:
      - checkout
      - jq/install
      - aws-cli/setup:
          profile-name: default
      - run:
          name: Install build and deploy requirements
          command: |
            python3 -m venv venv
            . venv/bin/activate
            pip install twine==6.1.0
      - run:
          name: Tag release from CHANGELOG
          command: |
            VERSION=$(grep -m1 '## \[[0-9]' CHANGELOG.md | sed 's/.*\[\([^]]*\)\].*/\1/')
            echo "CHANGELOG version: $VERSION"
            if git rev-parse "$VERSION" >/dev/null 2>&1; then
              echo "Tag $VERSION already exists, skipping"
            else
              git tag "$VERSION"
              echo "Tagged $VERSION locally"
            fi
      - run:
          name: Init .pypirc
          command: |
            aws codeartifact login --tool twine --repository clarifypypi --domain clarifyhealth --domain-owner 947634201780
      - run:
          name: Create package, check installable, upload artifact
          command: |
            . venv/bin/activate
            python3 setup.py sdist
            twine upload --repository codeartifact --skip-existing dist/*

workflows:
  version: 2
  primary:
    jobs:
      - check-for-sensitive-information
      - build-and-test:
          context: aws
          requires:
            - check-for-sensitive-information
      - artifact:
          context: aws
          requires:
            - build-and-test
          filters:
            branches:
              only: master
